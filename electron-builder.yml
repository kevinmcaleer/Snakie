appId: com.kevinmcaleer.snakie
productName: Snakie
copyright: Copyright © 2026 Kevin McAleer

# Directories
directories:
  output: dist
  buildResources: build

# Files included in the packaged app. electron-vite emits everything to out/.
# package.json is needed for the runtime metadata / main entry.
files:
  - out/**
  - package.json

# Keep the MicroPython WebAssembly runtime (offline simulated device, #135)
# OUTSIDE the asar so the loader can read the `.wasm` binary by file path at
# runtime. The main bundle externalizes the package (externalizeDepsPlugin) and
# resolves it from node_modules, so the `.wasm` must exist as a real file.
asarUnpack:
  - node_modules/@micropython/micropython-webassembly-pyscript/**

# Ship the Python plugin SDK + host and the bundled example plugins (issue #61)
# into the packaged app's resources/ dir. PluginHost resolves them from
# process.resourcesPath when app.isPackaged, and from the repo root in dev.
extraResources:
  - from: python
    to: python
    filter:
      - '**/*.py'
      - 'pyproject.toml'
      - 'README.md'
  - from: examples/plugins
    to: examples/plugins
    filter:
      - '**/*.py'
  # Ship the MicroPython instrument library (issue #107) so the app can offer
  # to install it onto the connected board (issue #108). `instruments:librarySource`
  # reads it from process.resourcesPath when packaged, and the repo root in dev.
  # The recursive `**/*.py` glob ALSO ships the per-component driver stubs under
  # `micropython/modules/` (issue #120); the main process resolves them the same
  # way (process.resourcesPath when packaged, repo root in dev) — see
  # src/main/modules/resolve.ts. No extra entry is needed.
  - from: micropython
    to: micropython
    filter:
      - '**/*.py'
  # Ship the bundled "Standard Boards" parts library (Pico / Pico 2 W / ESP32) so
  # the board selector has a canonical board set out of the box. The main process
  # seeds it into <userData>/parts on first run (src/main/parts/library.ts), and
  # resolves it from process.resourcesPath when packaged / the repo root in dev.
  - from: examples/parts/snakie-standard
    to: examples/parts/snakie-standard
    filter:
      - '**/*.yml'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.svg'

# Rebuild native modules (e.g. serialport) for the Electron ABI.
# npmRebuild defaults to true; nodeGypRebuild stays false so install-app-deps
# (run via the postinstall script / electron-builder) handles serialport.
npmRebuild: true

# Linux. The ARCH is chosen by the CLI flag per release job (NOT pinned here):
# pinning `arch` in the target list makes electron-builder build EVERY listed
# arch regardless of the `--x64`/`--arm64` flag, which cross-compiles and fails.
#   - x64  job: `--linux --x64`          → AppImage + deb (both x64).
#   - arm64 job: `--linux AppImage --arm64` → AppImage ONLY (Raspberry Pi 4/5 on
#     64-bit Pi OS). The arm64 job names just the AppImage target so the .deb is
#     skipped: electron-builder's bundled `fpm` is an x86 binary that fails on
#     arm64 ("Exec format error"), whereas appimagetool ships an arm64 build.
# Both Linux jobs run on their NATIVE arch (ubuntu-latest / ubuntu-24.04-arm), so
# the serialport native rebuild uses the matching toolchain — no cross-compile
# `-m64` failure.
linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: Kevin McAleer <kevinmcaleer@gmail.com>
  icon: build/icon.png

# Windows
# x64 only. arm64 is intentionally NOT built: while @serialport/bindings-cpp
# ships a win32-arm64 prebuild, GitHub-hosted Windows runners are x64 and
# producing a reliable arm64 nsis installer there is not straightforward
# (no native arm64 Windows runner in the hosted pool). Revisit if/when an
# arm64 Windows runner is available. Trade-off documented in README.
win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

# macOS
# Build BOTH Apple Silicon (arm64) and Intel (x64) as two separate dmgs.
# Chosen over a single `universal` build because universal merging of native
# modules (serialport) is more fragile; two per-arch dmgs are smaller and the
# more reliable option. Both archs build fine on the macos-latest (arm64)
# hosted runner — @serialport/bindings-cpp ships a darwin universal prebuild
# (darwin-x64+arm64), so no per-arch recompilation is needed.
mac:
  target:
    # dmg for manual install; zip is REQUIRED for electron-updater on macOS
    # (the auto-updater downloads the zip, not the dmg — otherwise it errors
    # "ZIP file not provided").
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  # Signing + notarization (#47). Active only when the CI signing secrets are
  # present (MAC_CSC_LINK etc. in release.yml); with no cert electron-builder
  # skips signing AND notarization, so unsigned CI builds keep working.
  # Signing (Developer ID) is what lets macOS auto-update *apply* (Squirrel.Mac
  # validates the signature); notarization clears the "damaged"/Gatekeeper
  # warning on first download. See docs/macos-signing.md.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarize with notarytool. The Team ID is set here directly (it is NOT secret
  # — it is embedded in every notarized app and in the Developer ID cert name);
  # the Apple ID + app-specific password still come from APPLE_ID /
  # APPLE_APP_SPECIFIC_PASSWORD in release.yml. Hardcoding teamId avoids the
  # "teamId property is required" failure when the APPLE_TEAM_ID secret is empty.
  notarize:
    teamId: LWGGBLVE3Q

# Publish installers to a GitHub Release for the pushed tag.
publish:
  provider: github
  owner: kevinmcaleer
  repo: Snakie
