appId: com.kevinmcaleer.snakie
productName: Snakie
copyright: Copyright © 2026 Kevin McAleer

# Directories
directories:
  output: dist
  buildResources: build

# Files included in the packaged app. electron-vite emits everything to out/.
# package.json is needed for the runtime metadata / main entry.
files:
  - out/**
  - package.json

# Ship the Python plugin SDK + host and the bundled example plugins (issue #61)
# into the packaged app's resources/ dir. PluginHost resolves them from
# process.resourcesPath when app.isPackaged, and from the repo root in dev.
extraResources:
  - from: python
    to: python
    filter:
      - '**/*.py'
      - 'pyproject.toml'
      - 'README.md'
  - from: examples/plugins
    to: examples/plugins
    filter:
      - '**/*.py'

# Rebuild native modules (e.g. serialport) for the Electron ABI.
# npmRebuild defaults to true; nodeGypRebuild stays false so install-app-deps
# (run via the postinstall script / electron-builder) handles serialport.
npmRebuild: true

# Linux
# x64 only for now. Linux arm64 packaging is deferred (tracked separately):
# even on a native ubuntu-24.04-arm runner, electron-builder's bundled `fpm`
# (used for .deb) is an x86 binary ("Exec format error" on arm64), and the
# serialport native rebuild emits the x86-only `-m64` flag that arm64 g++
# rejects. Making arm64 work needs more than a runner swap (e.g. AppImage-only
# + an arm64 fpm/appimagetool + a clean serialport rebuild).
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  maintainer: Kevin McAleer <kevinmcaleer@gmail.com>
  icon: build/icon.png

# Windows
# x64 only. arm64 is intentionally NOT built: while @serialport/bindings-cpp
# ships a win32-arm64 prebuild, GitHub-hosted Windows runners are x64 and
# producing a reliable arm64 nsis installer there is not straightforward
# (no native arm64 Windows runner in the hosted pool). Revisit if/when an
# arm64 Windows runner is available. Trade-off documented in README.
win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

# macOS
# Build BOTH Apple Silicon (arm64) and Intel (x64) as two separate dmgs.
# Chosen over a single `universal` build because universal merging of native
# modules (serialport) is more fragile; two per-arch dmgs are smaller and the
# more reliable option. Both archs build fine on the macos-latest (arm64)
# hosted runner — @serialport/bindings-cpp ships a darwin universal prebuild
# (darwin-x64+arm64), so no per-arch recompilation is needed.
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  # Code signing is intentionally disabled for now (see release.yml /
  # CSC_IDENTITY_AUTO_DISCOVERY=false). Future work: add real signing.

# Publish installers to a GitHub Release for the pushed tag.
publish:
  provider: github
  owner: kevinmcaleer
  repo: Snakie
