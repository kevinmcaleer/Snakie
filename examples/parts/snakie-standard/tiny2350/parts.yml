id: tiny2350
name: Pimoroni Tiny 2350
description: RP2350A in a tiny castellated board with an RGB LED + USB-C
manufacturer: Pimoroni
family: Microcontroller
mcu: RP2350
partNumber: PIM721
package: SMD
pinSpacing: 2.54
voltage: 3.3V
version: 0.1.3
pcbColor: "#15171a"
aspect: 0.786
dimensions:
  width: 18
  height: 22.9
shape:
  kind: rect
  cornerRadius: 0.08
# Life-like background: a clean top-down board photo (background removed → the
# board sits on transparency, so the castellated edge shows cleanly) fills the
# outline; the pins below are positioned over the photo's real pads (silk +
# components live in the photo, so no shapes are needed). Replace image.png with
# your own/licensed photo before redistributing.
image: image.png
imageLayer:
  x: 0
  y: 0
  w: 1
  h: 1
# Pinout verified against Pimoroni's official "Pins and Dims" diagram: 16 castellated
# pads, 8 per edge. Left (USB at top): 5V, GND, 3V3, A3-A0, GND. Right: GP0-GP7.
# Both edges share the same 8 y-positions so pads line up row-for-row.
headers:
  - edge: left
    pins:
      - name: 5V
        type: pwr
        number: 1
        castellated: true
        shape: castellated
        rotation: 180
        x: 0.085
        y: 0.207
      - name: GND
        type: gnd
        number: 2
        castellated: true
        shape: castellated
        rotation: 180
        x: 0.085
        y: 0.303
      - name: 3V3
        type: pwr
        number: 3
        castellated: true
        shape: castellated
        rotation: 180
        x: 0.085
        y: 0.398
      - name: A3
        type: io
        number: 4
        gpio: 29
        capabilities: [digital, pwm, adc, i2c, spi, uart]
        castellated: true
        shape: castellated
        rotation: 180
        x: 0.085
        y: 0.494
      - name: A2
        type: io
        number: 5
        gpio: 28
        capabilities: [digital, pwm, adc, i2c, spi, uart]
        castellated: true
        shape: castellated
        rotation: 180
        x: 0.085
        y: 0.590
      - name: A1
        type: io
        number: 6
        gpio: 27
        capabilities: [digital, pwm, adc, i2c, spi, uart]
        castellated: true
        shape: castellated
        rotation: 180
        x: 0.085
        y: 0.686
      - name: A0
        type: io
        number: 7
        gpio: 26
        capabilities: [digital, pwm, adc, i2c, spi, uart]
        castellated: true
        shape: castellated
        rotation: 180
        x: 0.085
        y: 0.781
      - name: GND
        type: gnd
        number: 8
        castellated: true
        shape: castellated
        rotation: 180
        x: 0.085
        y: 0.877
  - edge: right
    pins:
      - name: GP0
        type: io
        number: 9
        gpio: 0
        capabilities: [digital, pwm, spi, i2c, uart]
        castellated: true
        shape: castellated
        rotation: 0
        x: 0.915
        y: 0.207
      - name: GP1
        type: io
        number: 10
        gpio: 1
        capabilities: [digital, pwm, spi, i2c, uart]
        castellated: true
        shape: castellated
        rotation: 0
        x: 0.915
