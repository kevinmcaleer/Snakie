# Pins carry their RP2040/RP2350 fixed-function signals (pwm A/B, i2c SDA/SCL, spi
# RX/CSn/SCK/TX) + bus numbers (i2c/spi instance, adc channel). shape:castellated
# + per-edge rotation (left=180, right=0) makes the plated half-holes face outward
# and keeps every silk label horizontal (incl. the top & bottom pins in a column).
headers:
