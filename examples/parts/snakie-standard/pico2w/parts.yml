    pins:
      - { name: GP0, type: io, number: 1, gpio: 0, capabilities: [digital, pwm, i2c, spi], signals: { pwm: A, i2c: SDA, spi: RX }, buses: { i2c: 0, spi: 0 }, shape: castellated, rotation: 180 }
