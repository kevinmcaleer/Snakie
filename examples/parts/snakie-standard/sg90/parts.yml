id: sg90
name: SG90 Micro Servo
description: 9g hobby micro servo, ~180° range, 50 Hz PWM control.
manufacturer: TowerPro
family: Motor
tags:
  - servo
  - pwm
  - motor
package: THT
pinSpacing: 2.54
voltage: 4.8–6V
partNumber: SG90
properties:
  torque: 1.8 kg·cm @4.8V
  speed: 0.1 s/60°
  rotation: "180°"
  signal: 50 Hz PWM (1–2 ms)
version: 0.1.0
pcbColor: "#2b6cb0"
aspect: 0.38
dimensions:
  width: 12.2
  height: 32.2
shape:
  kind: rect
  cornerRadius: 2
# The 3 flying leads (orange signal / red VCC / brown GND). `type` drives the pad
# colour; the true wire colours are the drawn `shapes` rects below.
headers:
  - edge: left
    pins:
      - name: Signal
        label: PWM
        type: io
        gpio: 16
        capabilities:
          - digital
          - pwm
        signals:
          pwm: A
        shape: round
        x: 0.09
        y: 0.42
      - name: VCC
        label: "+5V"
        type: pwr
        shape: round
        x: 0.09
        y: 0.5
      - name: GND
        type: gnd
        shape: round
        x: 0.09
        y: 0.58
