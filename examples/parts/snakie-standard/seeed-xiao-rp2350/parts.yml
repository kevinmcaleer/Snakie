      - { name: D3, type: io, number: 4, gpio: 29, capabilities: [digital, pwm, adc], signals: { pwm: B, adc: 3 }, buses: { adc: 3 }, shape: castellated, castellated: true, rotation: 180, x: 0.09, y: 0.58 }
      - { name: D4, type: io, number: 5, gpio: 6, capabilities: [digital, pwm, i2c], signals: { pwm: A, i2c: SDA }, buses: { i2c: 1 }, shape: castellated, castellated: true, rotation: 180, x: 0.09, y: 0.6867 }
      - { name: D5, type: io, number: 6, gpio: 7, capabilities: [digital, pwm, i2c], signals: { pwm: B, i2c: SCL }, buses: { i2c: 1 }, shape: castellated, castellated: true, rotation: 180, x: 0.09, y: 0.7933 }
