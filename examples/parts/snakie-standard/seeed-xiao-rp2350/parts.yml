# XIAO form factor (21 x 17.8 mm): USB-C at top, 7 castellated pads down each
# long edge. Header GPIO map is shared across XIAO RP2040/RP2350 (Seeed keeps
# them pin-compatible): D4/D5 = I2C1, D6/D7 = UART0, D8/D9/D10 = SPI0, D0-D3 =
