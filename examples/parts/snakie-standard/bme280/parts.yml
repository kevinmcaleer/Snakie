id: bme280
name: BME280 Breakout
description: Bosch BME280 temperature / pressure / humidity sensor on an I²C breakout.
manufacturer: Pimoroni
family: Sensor
tags:
  - sensor
  - i2c
  - environmental
  - temperature
  - pressure
  - humidity
package: THT
pinSpacing: 2.54
voltage: "2-6V"
partNumber: BME280
properties:
  interface: I²C (0x76 default, 0x77 via ADDR)
  measures: temperature, pressure, humidity
  connectors: 0.1" header + Qw/ST (Qwiic / STEMMA QT)
version: 0.1.0
pcbColor: "#1b1b1b"
aspect: 1.0
dimensions:
  width: 19
  height: 19
shape:
  kind: rect
  cornerRadius: 2
# One 1x5 broken-out header along the bottom edge, in Pimoroni's Raspberry
# Pi-compatible order (Pi pins 1,3,5,7,9 → 2-6V, SDA, SCL, INT, GND). `type`
# drives the pad colour; SDA/SCL carry the i2c capability + signal so the Board
# View wires them to the microcontroller's I²C bus.
headers:
  - edge: bottom
    pins:
      - number: 1
        name: "2-6V"
        label: "2-6V"
        type: pwr
        shape: header
        x: 0.1
        y: 0.88
      - number: 2
        name: SDA
        label: SDA
        type: io
        capabilities:
          - i2c
        signals:
          i2c: SDA
        shape: header
        x: 0.3
        y: 0.88
      - number: 3
        name: SCL
        label: SCL
        type: io
        capabilities:
          - i2c
        signals:
          i2c: SCL
        shape: header
        x: 0.5
        y: 0.88
      - number: 4
        name: INT
        label: INT
        type: io
        shape: header
        x: 0.7
        y: 0.88
      - number: 5
        name: GND
        label: GND
        type: gnd
        shape: header
        x: 0.9
        y: 0.88
shapes:
  # The black PCB body.
  - kind: rect
    x: 0.05
    y: 0.06
    w: 0.9
    h: 0.82
    fill: "#1b1b1b"
    stroke: "#3a3a3a"
    strokeWidth: 1
    cornerRadius: 3
    z: 0
  # The Qw/ST (Qwiic / STEMMA QT) JST-SH socket on the top edge.
  - kind: rect
    x: 0.34
    y: 0.0
    w: 0.32
    h: 0.07
    fill: "#e8e4d8"
    stroke: "#b8b4a8"
    strokeWidth: 1
    cornerRadius: 1
    z: 1
  # The metal-lidded BME280 sensor IC (a small grey square).
  - kind: rect
    x: 0.4
    y: 0.36
    w: 0.2
    h: 0.2
    fill: "#b8bcc2"
    stroke: "#7a7d82"
    strokeWidth: 1
    cornerRadius: 1
    z: 2
labels:
  - text: BME280
    x: 0.5
    y: 0.22
    fontSize: 9
    color: "#e6e6e6"
    z: 3
library:
  module: bme280
drivers:
  - source: bme280.py
    target: lib/bme280.py
    label: BME280 driver
help: help.md
layerVisibility:
  pcb: false
  image: false
  holes: true
  pins: true
  components: true
