# nRF52840 routes I2C/SPI/UART through a flexible GPIO matrix, so pins carry their
# board-designated signals (SDA/SCL, SCK/MOSI/MISO, TX/RX) but NOT a fixed SPI/UART
# bus instance; ADC is fixed (AINx). gpio = P0.n -> n, P1.n -> 32+n. NeoPixel P0.16
# (power P1.14=46); red user LED P1.15=47, blue LED P1.10=42.
