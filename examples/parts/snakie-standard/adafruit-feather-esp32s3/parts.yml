# on the left (RST/3V/GND/A0-A5/SPI/UART) & right (BAT/EN/USB/D5-D13/I2C) rails.
# ESP32-S3 routes peripherals through a flexible GPIO matrix, so pins carry their
# board-designated signals (SDA/SCL, SCK/MOSI/MISO, TX/RX) but NOT a fixed SPI/UART
# bus instance. LED on GP13; NeoPixel on GP33 (power-enable GP21).
