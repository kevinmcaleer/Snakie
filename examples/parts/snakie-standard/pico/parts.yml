id: pico
mass_g: 3
help: help.md
name: Raspberry Pi Pico
description: RP2040 microcontroller board (40-pin, same header layout as the Pico W / 2 W).
manufacturer: Raspberry Pi
family: Microcontroller
tags:
  - rp2040
  - pico
package: THT
pinSpacing: 2.54
voltage: 1.8–5.5V
partNumber: SC0915
version: 1.0.2
mcu: RP2040
pcbColor: "#0f5a2e"
aspect: 0.4098
dimensions:
  width: 21
  height: 51
ledLabel: "25"
image: image.png
imageLayer: { x: 0, y: 0, w: 1, h: 1 }
electrical:
  # On-board 3.3V buck-boost regulator (RT6150). It runs off VSYS — which is where
  # both a battery/bench supply (direct) and USB (via the on-board VBUS→VSYS diode)
  # arrive — so modelling VSYS → 3V3 makes the 3V3 pins source current whenever VSYS
  # is powered. Only regulates when VSYS is driven.
  # (USB-on-VBUS-only still needs the VBUS→VSYS diode — a follow-up; #602.)
  model: regulator
  inputRail: VSYS
  outputRail: "3V3"
  outputV: 3.3
  dropoutV: 0.3
  maxCurrentA: 0.3
