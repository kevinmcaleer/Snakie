<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Content-Security-Policy keeps the renderer locked down. `data:` images
         are allowed because instruments render inline SVG / data-URI assets. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <title>Instrument</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/instrument-window-main.tsx"></script>
  </body>
</html>
