name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build installers on each OS in parallel. NOTHING publishes here — each job
  # just uploads its artifacts. This avoids the multi-job race where parallel
  # electron-builder --publish runs each create a duplicate draft release.
  build:
    # One job per (runner, electron-builder flag) combination. Each entry maps
    # to a specific OS/arch set of installers:
    #   - windows-latest  -> Windows x64 nsis
    #   - macos-latest     -> macOS arm64 + x64 dmgs (both archs build on the
    #                         arm64 hosted runner; see electron-builder.yml)
    #   - ubuntu-latest    -> Linux x64 AppImage + deb
    #   - ubuntu-24.04-arm -> Linux arm64 AppImage + deb (native arm64 hosted
    #                         runner — no QEMU/emulation; packaging tools run
    #                         on their native arch). Falls back to needing a
    #                         self-hosted arm64 runner if the hosted arm pool
    #                         is ever unavailable.
    # Each Linux runner builds ONLY its native arch (--linux --x64 / --arm64):
    # cross-arch native rebuilds of serialport fail (e.g. -m64 passed to arm64
    # g++). macOS builds both arm64+x64 on the arm64 runner because serialport
    # ships a universal darwin prebuild, so no cross-compilation is needed.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_flag: --win
            artifact: installers-windows
          - os: macos-latest
            platform_flag: --mac
            artifact: installers-macos
          - os: ubuntu-latest
            platform_flag: --linux --x64
            artifact: installers-linux-x64
          - os: ubuntu-24.04-arm
            platform_flag: --linux --arm64
            artifact: installers-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        # Derive the app version from the git tag (e.g. v0.1.0 -> 0.1.0) so the
        # installers and update metadata are named correctly, independent of the
        # committed package.json version.
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build installers (no publish)
        # platform_flag selects platform (+ arch for Linux). --mac builds both
        # mac arches (universal serialport prebuild); each Linux job is pinned
        # to its native arch to avoid cross-arch native rebuild failures.
        run: npm run dist -- ${{ matrix.platform_flag }} --publish never
        env:
          # Code signing intentionally disabled (future work); without this,
          # macOS builds would try to discover a signing identity and fail.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: warn

  # Collect every OS's artifacts and publish ONE draft GitHub Release for the
  # tag. Draft so a human reviews before it goes public.
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: Snakie ${{ github.ref_name }}
          files: dist/**
          fail_on_unmatched_files: false
