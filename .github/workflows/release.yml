name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build installers on each OS in parallel. NOTHING publishes here — each job
  # just uploads its artifacts. This avoids the multi-job race where parallel
  # electron-builder --publish runs each create a duplicate draft release.
  build:
    # One job per (runner, electron-builder flag) combination. Each entry maps
    # to a specific OS/arch set of installers:
    #   - windows-latest  -> Windows x64 nsis
    #   - macos-latest     -> macOS arm64 + x64 dmgs (both archs build on the
    #                         arm64 hosted runner; see electron-builder.yml)
    #   - ubuntu-latest    -> Linux x64 AppImage + deb
    #   - ubuntu-24.04-arm -> Linux arm64 AppImage (Raspberry Pi 4/5, 64-bit Pi
    #                         OS). Native arm64 hosted runner — no QEMU/emulation;
    #                         the serialport rebuild uses the arm64 toolchain and
    #                         appimagetool runs on its own arch. AppImage ONLY:
    #                         the arm64 .deb is skipped because the bundled fpm is
    #                         x86 (see electron-builder.yml).
    # macOS builds both arm64+x64 on the arm64 runner (serialport ships a
    # universal darwin prebuild).
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_flag: --win
            artifact: installers-windows
          - os: macos-latest
            platform_flag: --mac
            artifact: installers-macos
          - os: ubuntu-latest
            platform_flag: --linux --x64
            artifact: installers-linux-x64
          - os: ubuntu-24.04-arm
            # AppImage ONLY for arm64 (the arm64 .deb's fpm is x86 — see
            # electron-builder.yml). Naming the target skips deb.
            platform_flag: --linux AppImage --arm64
            artifact: installers-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        # Derive the app version from the git tag (e.g. v0.1.0 -> 0.1.0) so the
        # installers and update metadata are named correctly, independent of the
        # committed package.json version.
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      # platform_flag selects platform (+ arch for Linux). --mac builds both mac
      # arches (universal serialport prebuild); each Linux job is pinned to its
      # native arch to avoid cross-arch native rebuild failures.
      #
      # The build is split into a macOS step (with the signing + notarization env
      # from secrets) and a Windows/Linux step with NO signing env at all. This
      # avoids two traps:
      #   1. CSC_LINK leaking to Windows makes electron-builder sign the .exe with
      #      the macOS Developer ID cert (wrong);
      #   2. setting CSC_LINK to an *empty string* on Windows FAILS the build
      #      ("Env WIN_CSC_LINK ... not a file") — the var must be ABSENT, not
      #      empty. A per-key `… || ''` env can't omit a key, hence two steps.
      # Do NOT add CSC_IDENTITY_AUTO_DISCOVERY=false: it *disables* macOS code
      # signing outright (electron-builder logs "skipped … code signing"), which
      # previously shipped signed builds unsigned. See docs/macos-signing.md.
      - name: Build installers — macOS (signed + notarized)
        if: matrix.os == 'macos-latest'
        run: npm run dist -- ${{ matrix.platform_flag }} --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Baked into the main bundle so packaged apps can post bug reports (#206).
          # Empty when the secret is unset → feedback stays authorised-only.
          SNAKIE_FEEDBACK_KEY: ${{ secrets.SNAKIE_FEEDBACK_KEY }}

      - name: Build installers — Windows / Linux (unsigned)
        if: matrix.os != 'macos-latest'
        run: npm run dist -- ${{ matrix.platform_flag }} --publish never
        env:
          # See the macOS step — baked into the build for in-app bug reports (#206).
          SNAKIE_FEEDBACK_KEY: ${{ secrets.SNAKIE_FEEDBACK_KEY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: warn

  # Collect every OS's artifacts and publish ONE draft GitHub Release for the
  # tag. Draft so a human reviews before it goes public.
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Needed for CHANGELOG.md — the draft used to ship with EMPTY release
      # notes because this job never checked the repo out. Checking out the
      # pushed tag reads the changelog exactly as it was at release time.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Pull this version's section out of CHANGELOG.md — everything between
      # `## [X.Y.Z]` and whatever ends it: the next `## [` heading, or the
      # link-definition footer (`[0.1.0]: https://…`) for the OLDEST section,
      # which has no heading after it.
      #
      # Pure string ops (index/substr), NO regex: passing a bracketed regex
      # through awk's `-v` mangles the backslash escapes on the runner's mawk
      # (`escape sequence \[ treated as plain [`), so `[0.34.0]` became a
      # character class and never matched — every release shipped empty
      # curated notes. index($0,hdr) sidesteps escaping entirely.
      #
      # An unmatched version is not fatal: notes.md is left empty and
      # generate_release_notes below still produces GitHub's autogenerated
      # list, so a release never silently goes out blank again.
      - name: Extract release notes from CHANGELOG
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v hdr="## [${ver}]" '
            index($0, hdr) == 1                                   { flag = 1; next }
            flag && index($0, "## [") == 1                        { exit }
            flag && substr($0,1,1) == "[" && index($0, "]: ") > 0 { exit }
            flag                                                  { print }
          ' CHANGELOG.md > notes.md || true
          sed -i -e '/./,$!d' notes.md                   # strip leading blank lines
          printf '%s\n' "$(cat notes.md)" > notes.md     # strip trailing blank lines
          if [ -n "$(tr -d '[:space:]' < notes.md)" ]; then
            echo "Release notes for $ver: $(wc -l < notes.md) lines"
          else
            echo "::warning::No CHANGELOG.md section found for $ver — falling back to autogenerated notes"
          fi

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: Snakie ${{ github.ref_name }}
          body_path: notes.md
          # GitHub appends its own "What's Changed" + full-changelog link after
          # body_path, and carries the release on its own if the changelog
          # section is missing.
          generate_release_notes: true
          files: dist/**
          fail_on_unmatched_files: false
