name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build installers on each OS in parallel. NOTHING publishes here — each job
  # just uploads its artifacts. This avoids the multi-job race where parallel
  # electron-builder --publish runs each create a duplicate draft release.
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        # Derive the app version from the git tag (e.g. v0.1.0 -> 0.1.0) so the
        # installers and update metadata are named correctly, independent of the
        # committed package.json version.
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build installers (no publish)
        run: npm run dist -- --publish never
        env:
          # Code signing intentionally disabled (future work); without this,
          # macOS builds would try to discover a signing identity and fail.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: warn

  # Collect every OS's artifacts and publish ONE draft GitHub Release for the
  # tag. Draft so a human reviews before it goes public.
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: Snakie ${{ github.ref_name }}
          files: dist/**
          fail_on_unmatched_files: false
